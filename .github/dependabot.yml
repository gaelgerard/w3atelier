version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly" # Peut être "daily", "weekly", ou "monthly"
    open-pull-requests-limit: 10
    # Optionnel : regrouper les mises à jour pour éviter d'avoir 20 PR d'un coup
    groups:
      wp-plugins:
        patterns:
          - "wp-plugin/*"