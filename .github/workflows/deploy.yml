name: Deploy via GitHub Build (Critical CSS) & Sync

on:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1️⃣ WHITELIST (Lancée tôt pour laisser le pare-feu s'ouvrir pendant les installs)
      - name: Get runner public IP
        id: ip
        run: |
          ENV_IPV4=$(curl -s https://api.ipify.org)
          echo "ipv4=$ENV_IPV4" >> $GITHUB_OUTPUT

      - name: Whitelist runner IP on o2switch
        run: |
          IP="${{ steps.ip.outputs.ipv4 }}"
          PORT=${{ secrets.SFTP_PORT }}
          echo "Whitelisting IP: $IP on port $PORT"
          
          curl -sm 45 -H "Authorization: cpanel ${{ secrets.CPANEL_LOGIN }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=$IP&port=$PORT&direction=in" | jq

      # 2️⃣ BUILD DES ASSETS SUR GITHUB (Inclus Critical CSS)
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '${{ vars.THEME_DIR }}/package-lock.json'

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxss1 libasound2t64 libxtst6 libxshmfence1 libgbm1

      - name: Node Build (Local)
        run: |
          cd ${{ vars.THEME_DIR }}
          npm install
          npm run build

      # 3️⃣ PRÉPARATION SSH
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SFTP_PRIVATE_KEY }}

      # 4️⃣ DÉPLOIEMENT SÉQUENTIEL
      # Étape A : On met d'abord à jour le code Git sur le serveur et on fait le backup
      - name: SSH Update Git & Backup DB
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.SFTP_TARGET_DIR }}
            
            # 1. Backup préventif de la base de données avant toute modification
            if command -v wp > /dev/null 2>&1; then
              wp db export backup-before-update.sql
            fi

            # 2. Nettoyage et mise à jour des fichiers PHP/Templates via Git
            git fetch origin
            git reset --hard origin/main
          EOF

      # Étape B : Maintenant que Git a reset le dossier, on peut envoyer en toute sécurité les assets du thème compilés par GitHub
      - name: Transfer built assets via SCP
        run: |
          LOCAL_BUILD_PATH="${{ vars.THEME_DIR }}/public/build"
          REMOTE_THEME_PATH="${{ secrets.SFTP_TARGET_DIR }}/${{ vars.THEME_DIR }}"
          REMOTE_THEME_PATH=$(echo $REMOTE_THEME_PATH | sed 's#//#/#g')

          echo "Transferring build assets to: $REMOTE_THEME_PATH/public/"
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -P ${{ secrets.SFTP_PORT }} -r $LOCAL_BUILD_PATH ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:$REMOTE_THEME_PATH/public/

      # Étape C : Finalisation des dépendances PHP et vérification du site
      - name: SSH Finalize Composer & WP Core
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.SFTP_TARGET_DIR }}
            
            # 1. Dépendances PHP (On force l'utilisation de la version PHP du projet
            /opt/alt/php83/usr/bin/php -d memory_limit=-1 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            
            # 2. Gestion des extensions et traductions via WP-CLI
            if command -v wp > /dev/null 2>&1; then
              wp language plugin install --all fr_FR || echo "Erreur langues ignorée."
              wp plugin activate --all
              wp acorn optimize:clear || echo "Acorn non configuré, skip."
            fi

            # 3. Test de validation finale (Code HTTP 200)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.WEBSITE_URL }} )

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "ERREUR : Le site répond avec un code $HTTP_CODE. Lancement du Rollback..."
              if [ -f "backup-before-update.sql" ]; then
                wp db import backup-before-update.sql
              fi
              exit 1
            else
              echo "Succès : Le site est en ligne (Code 200)."
              rm -f backup-before-update.sql
            fi
          EOF

      # 5️⃣ CLEANUP
      - name: Remove runner IP from whitelist
        if: always()
        run: |
          IP="${{ steps.ip.outputs.ipv4 }}"
          PORT=${{ secrets.SFTP_PORT }}
          echo "Removing GitHub runner IP from whitelist: $IP"

          curl -sm 45 -H "Authorization: cpanel ${{ secrets.CPANEL_LOGIN }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove?address=$IP&port=$PORT&direction=in" | jq

          curl -sm 45 -H "Authorization: cpanel ${{ secrets.CPANEL_LOGIN }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove?address=$IP&port=$PORT&direction=out" | jq